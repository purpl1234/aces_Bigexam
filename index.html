<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACES 複習</title>
    <style>
        :root { --primary: #4a90e2; --bg: #f5f7fa; --dark: #333; --success: #2ecc71; --error: #e74c3c; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--dark); line-height: 1.6; }
        .container { max-width: 700px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary); margin-bottom: 25px; }
        
        .nav { display: flex; gap: 10px; margin-bottom: 25px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: #e0e0e0; transition: 0.3s; font-size: 16px; }
        .btn.active { background: var(--primary); color: white; }
        .section { display: none; min-height: 300px; }
        .section.active { display: block; }
        
        /* 播放器樣式 */
        .audio-player { background: #eef5ff; padding: 15px; border-radius: 10px; margin-bottom: 15px; display: none; border: 1px solid #d0e3ff; }
        .audio-player.show { display: block; }
        audio { width: 100%; height: 40px; }

        #learning-content { white-space: pre-wrap; word-wrap: break-word; background: #f9f9f9; padding: 20px; border-left: 5px solid var(--primary); border-radius: 4px; font-size: 18px; }

        /* 測驗區 */
        .q-title { font-size: 20px; margin-bottom: 15px; font-weight: bold; }
        .opt-btn { display: block; width: 100%; text-align: left; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; background: white; font-size: 16px; transition: 0.2s; }
        #quiz-feedback { text-align: center; font-size: 20px; font-weight: bold; height: 30px; margin: 15px 0; }
        
        /* 管理介面 */
        .admin-box { background: #fff3cd; padding: 20px; border-radius: 10px; border: 1px solid #ffeeba; }
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .action-row { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        .save-btn { background: var(--success); color: white; flex: 2; min-width: 150px; }
        .load-btn { background: #6c757d; color: white; flex: 1; }
        .delete-btn { background: var(--error); color: white; flex: 1; min-width: 100px; }
    </style>
</head>
<body>

<div class="container">
    <h1>ACES 複習</h1>

    <div class="nav">
        <button class="btn active" id="btn-learn" onclick="showPage('learn')">📖 學習模式</button>
        <button class="btn" id="btn-quiz" onclick="showPage('quiz')">✍️ 測驗模式</button>
        <button class="btn" id="btn-admin" onclick="showPage('admin')">⚙️ 管理後台</button>
    </div>

    <div id="page-learn" class="section active">
        <select id="unit-selector-learn" onchange="loadSpecificUnit(this.value)"></select>
        
        <div id="audio-container" class="audio-player">
            <p style="margin:0 0 10px 0; font-weight:bold; color:var(--primary);">🎧 單元音檔播放：</p>
            <audio id="unit-audio-player" controls src=""></audio>
        </div>

        <div id="learning-content">歡迎！請選取單元開始複習。</div>
    </div>

    <div id="page-quiz" class="section">
        <select id="unit-selector-quiz" onchange="startQuiz(this.value)"></select>
        <hr>
        <div id="quiz-area">
            <p style="text-align:center; color:#888;">選取單元後將自動開始。</p>
        </div>
        <div id="quiz-feedback"></div>
    </div>

    <div id="page-admin" class="section">
        <div id="admin-login">
            <input type="password" id="admin-pw" placeholder="密碼 1234">
            <button class="btn active" style="width:100%" onclick="checkAdmin()">登入</button>
        </div>
        
        <div id="admin-content" style="display:none;" class="admin-box">
            <h3>單元編輯</h3>
            <div class="action-row">
                <input type="text" id="edit-unit-id" placeholder="單元 ID">
                <button class="btn load-btn" onclick="loadExistingUnit()">🔍 載入</button>
            </div>
            
            <input type="text" id="edit-unit-title" placeholder="選單名稱 (如: 4期-A.Be Like)">
            <input type="text" id="edit-unit-audio" placeholder="音檔網址 (https://...)">
            <textarea id="edit-unit-rules" rows="8" placeholder="教學內容..."></textarea>
            <textarea id="edit-unit-quiz" rows="6" placeholder="題庫 JSON..."></textarea>
            
            <div class="action-row">
                <button class="btn save-btn" onclick="saveToFirebase()">💾 儲存</button>
                <button class="btn delete-btn" onclick="deleteUnit()">🗑️ 刪除單元</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, collection, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // 🔴 請更換為您的 Firebase 設定 🔴
    const firebaseConfig = {
        apiKey: "AIzaSyCyv5f5i4x6_1pKVKGfNNDvOULTYAuqvCg",
  authDomain: "aces-bigexam.firebaseapp.com",
  projectId: "aces-bigexam",
  storageBucket: "aces-bigexam.firebasestorage.app",
  messagingSenderId: "591140296494",
  appId: "1:591140296494:web:f5e149fceebcb025e3ccbf"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentQuizData = [];
    let currentQIdx = 0;
    let isProcessing = false;

    window.showPage = (pageId) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
        document.getElementById('btn-' + pageId).classList.add('active');
        refreshUnitLists();
    };

    window.checkAdmin = () => {
        if(document.getElementById('admin-pw').value === "1234") {
            document.getElementById('admin-login').style.display = 'none';
            document.getElementById('admin-content').style.display = 'block';
        } else { alert("密碼錯誤"); }
    };

    window.loadExistingUnit = async () => {
        const id = document.getElementById('edit-unit-id').value;
        if(!id) return alert("請輸入 ID");
        const docSnap = await getDoc(doc(db, "english_units", id));
        if (docSnap.exists()) {
            const data = docSnap.data();
            document.getElementById('edit-unit-title').value = data.title;
            document.getElementById('edit-unit-audio').value = data.audioUrl || "";
            document.getElementById('edit-unit-rules').value = data.learningContent;
            document.getElementById('edit-unit-quiz').value = JSON.stringify(data.quizData, null, 2);
            alert("載入成功");
        } else { alert("查無此單元"); }
    };

    window.saveToFirebase = async () => {
        const id = document.getElementById('edit-unit-id').value;
        const title = document.getElementById('edit-unit-title').value;
        const audio = document.getElementById('edit-unit-audio').value;
        const rules = document.getElementById('edit-unit-rules').value;
        const quizStr = document.getElementById('edit-unit-quiz').value;
        if(!id || !title) return alert("ID 或名稱不能空白");
        try {
            await setDoc(doc(db, "english_units", id), {
                title: title, 
                audioUrl: audio,
                learningContent: rules, 
                quizData: JSON.parse(quizStr)
            });
            alert("儲存成功");
            refreshUnitLists();
        } catch (e) { alert("JSON 格式錯誤"); }
    };

    window.deleteUnit = async () => {
        const id = document.getElementById('edit-unit-id').value;
        if(!id) return alert("請輸入要刪除的單元 ID");
        if(confirm("⚠ 確定要永久刪除此單元嗎？")) {
            await deleteDoc(doc(db, "english_units", id));
            alert("已刪除單元");
            refreshUnitLists();
        }
    };

    async function refreshUnitLists() {
        const querySnapshot = await getDocs(collection(db, "english_units"));
        const selectors = [document.getElementById('unit-selector-learn'), document.getElementById('unit-selector-quiz')];
        selectors.forEach(s => {
            const oldVal = s.value;
            s.innerHTML = '<option value="">-- 選擇單元 --</option>';
            querySnapshot.forEach(doc => {
                s.innerHTML += `<option value="${doc.id}">${doc.data().title}</option>`;
            });
            s.value = oldVal;
        });
    }

    window.loadSpecificUnit = async (id) => {
        if(!id) return;
        const docSnap = await getDoc(doc(db, "english_units", id));
        if (docSnap.exists()) {
            const data = docSnap.data();
            document.getElementById('learning-content').innerText = data.learningContent;
            
            // 處理音檔播放器顯示與更換網址
            const playerContainer = document.getElementById('audio-container');
            const player = document.getElementById('unit-audio-player');
            if (data.audioUrl) {
                playerContainer.classList.add('show');
                player.src = data.audioUrl;
                player.load(); // 重新載入音檔
            } else {
                playerContainer.classList.remove('show');
                player.src = "";
            }
        }
    };

    window.startQuiz = async (id) => {
        if(!id) return;
        const docSnap = await getDoc(doc(db, "english_units", id));
        if (docSnap.exists()) {
            currentQuizData = docSnap.data().quizData;
            currentQIdx = 0;
            renderQuestion();
        }
    };

    function renderQuestion() {
        const area = document.getElementById('quiz-area');
        const feedback = document.getElementById('quiz-feedback');
        feedback.innerText = "";
        isProcessing = false;

        if(currentQIdx >= currentQuizData.length) {
            area.innerHTML = "<h3 style='text-align:center; color:var(--success)'>🎉 複習完成！</h3>";
            return;
        }
        const q = currentQuizData[currentQIdx];
        let html = `<div class="q-title">${currentQIdx + 1}. ${q.q}</div>`;
        q.options.forEach((opt, i) => {
            html += `<button class="opt-btn" onclick="window.checkUserAns(${i}, ${q.ans})">${opt}</button>`;
        });
        area.innerHTML = html;
    }

    window.checkUserAns = (selected, correct) => {
        if(isProcessing) return;
        const feedback = document.getElementById('quiz-feedback');
        const btns = document.querySelectorAll('.opt-btn');
        isProcessing = true;
        btns.forEach(b => b.disabled = true);

        if(selected === correct) {
            feedback.innerText = "✅ 正確！";
            feedback.style.color = "var(--success)";
            setTimeout(() => { currentQIdx++; renderQuestion(); }, 800);
        } else {
            feedback.innerText = "❌ 再試一次！";
            feedback.style.color = "var(--error)";
            setTimeout(() => {
                feedback.innerText = "";
                btns.forEach(b => b.disabled = false);
                isProcessing = false;
            }, 1000);
        }
    };

    refreshUnitLists();
</script>
</body>
</html>
